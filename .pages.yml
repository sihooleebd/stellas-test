media:
  input: media
  output: /media

content:
  - name: posts
    label: Photo Posts
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, photographer, taken_at, camera]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publish Date
        type: date
        required: true
      - name: photo
        label: Photo
        type: image
        required: true
      - name: photographer
        label: Photographer
        type: string
        required: true
      - name: location
        label: Location
        type: string
      - name: taken_at
        label: Date Taken
        type: date
      - name: camera
        label: Camera
        type: string
      - name: lens
        label: Lens
        type: string
      - name: iso
        label: ISO
        type: number
      - name: aperture
        label: Aperture
        type: string
      - name: shutter_speed
        label: Shutter Speed
        type: string
      - name: editing_software
        label: Editing Software
        type: string
      - name: body
        label: Caption / Story
        type: rich-text

  - name: about
    label: About Page
    type: file
    path: about.md
    fields:
      - name: layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Title
        type: string
      - name: permalink
        type: string
        hidden: true
        default: /about/
      - name: body
        label: Body
        type: rich-text

  - name: stellar_festival
    label: Stellar Festival Page
    type: file
    path: stellar-festival.md
    fields:
      - name: layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Title
        type: string
      - name: permalink
        type: string
        hidden: true
        default: /stellar-festival/
      - name: body
        label: Body
        type: rich-text
